name: Notify Teams on Push

on:
  push:
    branches: ['**']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | tr '\n' ', ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Notify Teams
        run: |
          curl -H "Content-Type: application/json" -d '{
            "workflow": "Push Notification",
            "status": "commit",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "run_url": "${{ github.event.head_commit.url }}",
            "message": "${{ github.event.head_commit.message }} | Files: ${{ steps.changes.outputs.files }}"
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
