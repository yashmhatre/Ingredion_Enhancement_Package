name: Notify Teams on Push

on:
  push:
    branches: ['**']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | tr '\n' ', ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Notify Teams
        run: |
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {"type": "TextBlock", "text": "🔔 Push to ${{ github.repository }}", "weight": "bolder", "size": "medium"},
                  {"type": "FactSet", "facts": [
                    {"title": "Branch", "value": "${{ github.ref_name }}"},
                    {"title": "Author", "value": "${{ github.actor }}"},
                    {"title": "Message", "value": "${{ github.event.head_commit.message }}"},
                    {"title": "Files changed", "value": "${{ steps.changes.outputs.files }}"}
                  ]}
                ],
                "actions": [{
                  "type": "Action.OpenUrl",
                  "title": "View Commit",
                  "url": "${{ github.event.head_commit.url }}"
                }]
              }
            }]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
      - name: Send Teams channel email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: yash.mhatre@exeliqconsulting.com
          password: ${{ secrets.SMTP_APP_PASSWORD }}
          subject: "🔔 Push to ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.TEAMS_CHANNEL_EMAIL }}
          from: GitHub Actions <yash.mhatre@exeliqconsulting.com>
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Message: ${{ github.event.head_commit.message }}

            Files changed:
            ${{ steps.changes.outputs.files }}

            View: ${{ github.event.head_commit.url }}
